version: "3.8"

services:
  laravel:
    image: 0raffi0/easypark:latest
    networks:
      - easypark_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    volumes:
      - /var/www/easypark/.env:/var/www/html/.env
      - storage_data:/var/www/html/storage

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /var/www/easypark/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - easypark_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: easypark_db
      MYSQL_USER: easypark_user
      MYSQL_PASSWORD: StrongPass123!
      MYSQL_ROOT_PASSWORD: RootPass123!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - easypark_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - /var/www/easypark/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - easypark_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - easypark_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  easypark_network:
    driver: overlay

volumes:
  mysql_data:
  storage_data:
  prometheus_data:
  grafana_data: